name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Install build dependencies
        run: sudo apt-get update && sudo apt-get install -y gcc libsqlite3-dev
      - name: Build
        run: CGO_ENABLED=1 go build ./...
      - name: Unit Tests
        run: CGO_ENABLED=1 go test -race ./...
      - name: Vet
        run: go vet ./...

  integration-tests:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: arcan_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    env:
      ARCAN_TEST_POSTGRES_URL: postgres://test:test@localhost:5432/arcan_test?sslmode=disable
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Install build dependencies
        run: sudo apt-get update && sudo apt-get install -y gcc libsqlite3-dev
      - name: Integration Tests
        run: CGO_ENABLED=1 go test -tags integration -race ./...
